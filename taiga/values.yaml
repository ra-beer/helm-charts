# Default values for taiga.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: nginx
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
  - name: gateway
    sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
  - chart-example.local
  # List of rules and filters applied.
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

taiga-events-rabbitmq:
  auth:
    username: "taiga-events"
    password: "taiga-events"
    erlangCookie: "taiga-events"
  extraConfiguration: |-
    default_vhost = taiga

taiga-async-rabbitmq:
  auth:
    username: "taiga-async"
    password: "taiga-async"
    erlangCookie: "taiga-async"
  extraConfiguration: |-
    default_vhost = taiga

back:
  image:
    repository: taigaio/taiga-back
    tag: "latest"
    pullPolicy: IfNotPresent
  # Environment variables for the back container. Use a list of objects: - name: FOO
  #   value: bar
  env: []
  # Volumes and mounts for the back container (standard Kubernetes volume/volumeMount objects)
  volumes: []
  volumeMounts: []
  # Informational only: services the container depends on in compose semantics
  dependsOn: []
  service:
    type: ClusterIP
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        protocol: TCP

async:
  enabled: true
  # Override replicas for the async Deployment (falls back to top-level replicaCount)
  replicas: 1
  image:
    repository: taigaio/taiga-back
    tag: "latest"
    pullPolicy: IfNotPresent
  # Command/entrypoint for the async worker
  command:
    - "/taiga-back/docker/async_entrypoint.sh"
  env: []
  volumes: []
  volumeMounts: []
  # Informational only: compose-style dependencies
  dependsOn: []
  service:
    type: ClusterIP
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        protocol: TCP

front:
  enabled: true
  replicas: 1
  image:
    repository: taigaio/taiga-front
    tag: "latest"
    pullPolicy: IfNotPresent
  # Environment variables exposed to the front container. Use a list of objects:
  # - name: TAIGA_URL
  #   value: "https://example.com"
  env:
    - name: TAIGA_URL
      value: "${TAIGA_SCHEME}://${TAIGA_DOMAIN}"
    - name: TAIGA_WEBSOCKETS_URL
      value: "${WEBSOCKETS_SCHEME}://${TAIGA_DOMAIN}"
    - name: TAIGA_SUBPATH
      value: "${SUBPATH}"
  # Optional volume for custom conf.json (e.g. hostPath or configMap/secret)
  volumes: []
  volumeMounts: []
  service:
    type: ClusterIP
    port: 80
    targetPort: http
    protocol: TCP
    name: http

events:
  enabled: true
  replicas: 1
  image:
    repository: taigaio/taiga-events
    tag: "latest"
    pullPolicy: IfNotPresent
  env:
    - name: RABBITMQ_USER
      value: "${RABBITMQ_USER}"
    - name: RABBITMQ_PASS
      value: "${RABBITMQ_PASS}"
    - name: TAIGA_SECRET_KEY
      value: "${SECRET_KEY}"
  volumes: []
  volumeMounts: []
  dependsOn: []
  service:
    type: ClusterIP
    ports:
      - name: http
        port: 8000
        targetPort: 8000
        protocol: TCP

protected:
  enabled: true
  replicas: 1
  image:
    repository: taigaio/taiga-protected
    tag: "latest"
    pullPolicy: IfNotPresent
  env:
    - name: MAX_AGE
      value: "${ATTACHMENTS_MAX_AGE}"
    - name: SECRET_KEY
      value: "${SECRET_KEY}"
  volumes: []
  volumeMounts: []
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
    protocol: TCP
    name: http

gateway:
  enabled: true
  replicas: 1
  image:
    repository: nginx
    tag: "1.19-alpine"
    pullPolicy: IfNotPresent
  # Container port (nginx default)
  containerPort: 80
  # Host -> container port mapping from docker-compose (informational)
  hostPort: 9000
  # Volume mounts and volumes (provide config and persistent volumes via values)
  volumes: []
  volumeMounts: []
  # Optional dependencies (compose semantics)
  dependsOn: []
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
    protocol: TCP
    name: http
